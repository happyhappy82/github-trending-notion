name: Fetch OpenAI Stories → Notion

on:
  schedule:
    - cron: "34 * * * *"  # 매시 34분
  workflow_dispatch:  # 수동 실행 가능

jobs:
  fetch-stories:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Fetch OpenAI Stories and save to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python fetch_openai_stories.py

      - name: Commit seen keys
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_*.json
          git diff --staged --quiet || (git commit -m "Update seen_openai_stories [skip ci]" && git pull --rebase && git push)

  notify-failure:
    runs-on: ubuntu-latest
    needs: [fetch-stories]
    if: ${{ failure() }}
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 [${context.workflow}] 실패 - ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `## 워크플로우 실패 알림`,
              ``,
              `- **워크플로우**: ${context.workflow}`,
              `- **실행 시간**: ${new Date().toISOString()}`,
              `- **로그**: [확인하기](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ``,
              `> 자동 생성된 알림입니다.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['workflow-failure']
            });
