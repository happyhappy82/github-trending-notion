name: Fetch GitHub Trending → Notion

on:
  schedule:
    - cron: "0 6 * * *"  # 매일 UTC 06:00 (KST 15:00)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  fetch-trending:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch trending and save to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_trending.py

      - name: Commit and push seen_trending.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_trending.json
          git diff --cached --quiet || git commit -m "Update seen_trending.json"
          git push
