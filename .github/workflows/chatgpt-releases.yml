name: Fetch ChatGPT Release Notes → Notion

on:
  schedule:
    - cron: "0 7 * * *"  # 매일 UTC 07:00 (KST 16:00)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  fetch-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Fetch ChatGPT Release Notes and save to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python fetch_chatgpt_releases.py

      - name: Commit seen keys
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_*.json
          git diff --staged --quiet || (git commit -m "Update seen_chatgpt_releases [skip ci]" && git push)
