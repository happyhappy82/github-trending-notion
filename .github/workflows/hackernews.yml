name: Fetch Hacker News AI → Notion

on:
  schedule:
    - cron: "15 8 * * *"  # 매일 UTC 08:15 (KST 17:15)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  fetch-hackernews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Hacker News AI feeds and save to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_hackernews.py

      - name: Commit seen keys
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_*.json
          git diff --staged --quiet || (git commit -m "Update seen_hackernews [skip ci]" && git pull --rebase && git push)

  notify-failure:
    runs-on: ubuntu-latest
    needs: [fetch-hackernews]
    if: ${{ failure() }}
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 [${context.workflow}] 실패 - ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `## 워크플로우 실패 알림`,
              ``,
              `- **워크플로우**: ${context.workflow}`,
              `- **실행 시간**: ${new Date().toISOString()}`,
              `- **로그**: [확인하기](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ``,
              `> 자동 생성된 알림입니다.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['workflow-failure']
            });
