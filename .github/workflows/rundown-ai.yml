name: Fetch The Rundown AI → Notion

on:
  schedule:
    - cron: "38 * * * *"  # 매시 38분
  workflow_dispatch:  # 수동 실행 가능

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch The Rundown AI RSS and save to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python fetch_rundown_ai.py

      - name: Commit seen keys
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_*.json
          if ! git diff --staged --quiet; then
            git commit -m "Update seen_rundown_ai [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase && git push && break
              echo "Push failed (attempt $i), retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: [fetch-rss]
    if: ${{ failure() }}
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 [${context.workflow}] 실패 - ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              `## 워크플로우 실패 알림`,
              ``,
              `- **워크플로우**: ${context.workflow}`,
              `- **실행 시간**: ${new Date().toISOString()}`,
              `- **로그**: [확인하기](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ``,
              `> 자동 생성된 알림입니다.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['workflow-failure']
            });
